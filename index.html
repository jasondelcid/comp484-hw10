<!DOCTYPE html>
<html>
  <head>
    <title>Your Giga Pet</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="style.css">

    <!-- jQuery must load before script.js so the $ symbol works correctly. -->
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"></script>
    <script src="script.js" defer></script>
  </head>

  <body>
    <header>
      <h1>My Giga Pet</h1>
    </header>

    <main>
      <section class="pet-image-container">
        <img class="pet-image" src="pixeldog.png" alt="Cute pet dog">
      </section>

      <section class="dashboard">
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
        <div>Happiness: <strong><span class="happiness"></span> tail wags</strong></div>
        <div>Energy: <strong><span class="energy"></span> zoomies</strong></div>
        <div>Mood: <strong><span class="mood"></span></strong></div>

        <p class="pet-comment">Your pet is ready!</p>

        <div class="button-container">
          <button class="treat-button">Treat</button>
          <button class="play-button">Play</button>
          <button class="exercise-button">Exercise</button>
          <button class="nap-button">Nap</button>
        </div>
      </section>
    </main>
  </body>
</html>
